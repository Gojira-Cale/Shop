<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Outwards Shop</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #shop-container {
            width: 800px;
            height: 600px;
            border: 4px solid white;
            position: relative;
            background: #000;
        }
        .pixelated {
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <div id="shop-container">
    <!-- Dialogue Text Box -->
    <div id="dialogue-box">
        <div class="dialogue-contents">
            <span class="asterisk">*</span> 
            <span id="dialogue-text">Welcome !</span>
        </div>
        <div id="next-page-indicator">▼</div>
    </div>

    <!-- The Interactive Shop Grid Menu -->
    <div id="shop-menu-grid">
        
        <div id="soul-cursor">♥</div>
        
        <!-- Grid Items-->
        <div class="menu-item active" data-index="0" data-action="buy">Buy</div>
        <div class="menu-item" data-index="1" data-action="sell">Sell</div>
        <div class="menu-item" data-index="2" data-action="talk">Talk</div>
        <div class="menu-item" data-index="3" data-action="exit">Exit</div>
    </div>
</div>
</body>
</html>
