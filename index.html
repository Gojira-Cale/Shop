<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Outsider Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="shop-container">
        <!-- Shopkeeper Sprite -->
        <div class="shopkeeper">
            <img src="assests/shop/me/idle-sprite.gif" alt="me" id="idle-sprite">
        </div>

        <!-- Gold Counter -->
        <div class="gold-counter">
            GOLD: <span id="gold-amount">100</span>G
        </div>

        <!-- Dialog Box with Sprite Background -->
        <div class="dialog-box" id="dialog-box">
            <p id="dialog-text">Welcome!</p>
        </div>

        <!-- Main Menu -->
        <div class="menu" id="main-menu">
            <button class="menu-btn" onclick="openBuyMenu()">Buy</button>
            <button class="menu-btn" onclick="openSellMenu()">Sell</button>
            <button class="menu-btn" onclick="talk()">Talk</button>
            <button class="menu-btn" onclick="exitShop()">Exit</button>
        </div>

        <!-- Buy Menu -->
        <div class="menu hidden" id="buy-menu">
            <div class="item" onclick="buyItem('xxx', 20)">xxx - 20G</div>
            <div class="item" onclick="buyItem('xxx', 50)">xxx - 50G</div>
            <div class="item" onclick="buyItem('xxx', 80)">xxx - 80G</div>
            <button class="menu-btn" onclick="backToMain()">Back</button>
        </div>

        <!-- Sell Menu -->
        <div class="menu hidden" id="sell-menu">
            <div id="inventory-list"></div>
            <button class="menu-btn" onclick="backToMain()">Back</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
