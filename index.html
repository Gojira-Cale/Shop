<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deltarune-Style Shopkeeper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="shop-container">
        <div class="shopkeeper">
            
            <img src="assests/shop/me/idle-sprite.gif" alt="me" id="idle-sprite">
        </div>
        <div class="dialog-box" id="dialog-box">
            <p id="dialog-text">Welcome !</p>
        </div>
        <div class="menu">
            <button class="menu-btn" onclick="selectOption('Buy')">Buy</button>
            <button class="menu-btn" onclick="selectOption('Sell')">Sell</button>
            <button class="menu-btn" onclick="selectOption('Talk')">Talk</button>
            <button class="menu-btn" onclick="selectOption('Exit')">Exit</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
