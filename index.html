<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Outwards Shop</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
           overflow: hidden;
        }

        #game-window {
            width: 640px;
            height: 480px;
            background-color: black;
            display: flex;
            flex-direction: column;
            position: relative;
        }
            #shopkeeper-stage {
            width: 100%;
            height: 240px;
            background: #110e1a;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            overflow: hidden;
        }

        #shopkeeper-sprite {
            width: auto;
            height: 90%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            object-fit: contain;
        }
        .fallback-graphic-text {
            color: rgba(255,255,255,0.25);
            font-size: 14px;
            margin-bottom: 40px;
            text-align: center;
        }

        
        #shop-panel-frame {
            width: 620px;
            height: 220px;
            margin: 0 auto 10px auto;
            background-color: black;
            box-sizing: border-box;
            position: relative;
            
            
            border: 6px double white; 
            outline: 2px solid black;
            
            display: flex;
            padding: 20px 25px;
        }

        
        #left-dialogue-pane {
            flex: 1;
            font-size: 24px;
            font-weight: bold;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            position: relative;
            padding-right: 15px;
        }

        .asterisk {
            margin-right: 12px;
            color: white;
        }
#dialogue-text {
            color: white;
            word-break: break-word;
            white-space: pre-wrap;
        }

       
        #right-menu-pane {
            width: 150px;
            height: 100%;
            border-left: 4px double white; 
            padding-left: 35px; 
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative;
            box-sizing: border-box;
        }

        .menu-list-items-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .menu-option {
            font-size: 24px;
            font-weight: bold;
            text-transform: capitalize;
            color: white;
            height: 32px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        
        #currency-counter {
            position: absolute;
            bottom: 0;
            left: 35px;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        
        #soul-cursor {
            position: absolute;
            color: #ff0000;
            font-size: 24px;
            line-height: 1;
            pointer-events: none;
            
            transition: top 0.05s steps(2); 
            left: 10px; 
        }
/* Initial Audio Authorization Screen Overlay Box Layout */
        #click-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            font-size: 20px;
            color: #ff00ff;
            cursor: pointer;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>


<div id="game-window">

    
    <div id="shopkeeper-stage">
        <img id="idle-sprite" src="assests/shop/me/idle-sprite.gif" alt="me" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <div class="fallback-graphic-text">( Place 'shopkeeper.png' sprite asset file here )</div>
    </div>

    
    <div id="shop-panel-frame">
        
        
        <div id="left-dialogue-pane">
            <span class="asterisk">*</span>
            <span id="dialogue-text">...</span>
        </div>

        <div id="right-menu-pane">
            <div id="soul-cursor">♥</div>
            
            <div class="menu-list-items-wrapper">
                <div class="menu-option" data-index="0" data-action="buy">Buy</div>
                <div class="menu-option" data-index="1" data-action="sell">Sell</div>
                <div class="menu-option" data-index="2" data-action="talk">Talk</div>
                <div class="menu-option" data-index="3" data-action="exit">Exit</div>
            </div>

            
            <div id="currency-counter">D$ 2500</div>
        </div>

    </div>

</div>

<script>

const SHOP_DIALOGUE = {
    greeting: [
        "Heh heh... [delay:200] Welcome, travelers.",
        "Take a look around... [delay:300]\nif you dare look into the void."
    ],
    buy: ["What caught your eye?"],
    sell: ["I don't need your garbage right now."],
    talk: [
        "This room stays warm while the world outside grows colder.",
        "Fountains change things... [delay:300] but old walls stay sturdy."
    ],
    exit: ["Goodbye. [delay:200] Don't get lost in the dark."]
};


const state = {
    
    textNode: document.getElementById('dialogue-text'),
    cursorNode: document.getElementById('soul-cursor'),
    menuOptions: document.querySelectorAll('.menu-option'),

    
    currentMenuIndex: 0,

    activePageArray: [],
    currentPageIndex: 0,
    currentTextString: "",
    currentCharIndex: 0,
    typingSpeedMs: 30,
    isTextAnimating: false,
    timerId: null,
    audioContext: null
};


function initializeEngine() {
    
    document.getElementById('click-shield').style.display = 'none';

    
    state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    if (state.audioContext.state === 'suspended') {
        state.audioContext.resume();
    }

    
    setupControlBindings();
    positionSoulCursor();
    triggerDialogue('greeting');
}


function positionSoulCursor() {
    const activeItem = state.menuOptions[state.currentMenuIndex];
    
    
    state.menuOptions.forEach(opt => opt.style.color = "white");
    activeItem.style.color = "#ffff00"; 

    
    const targetTopOffset = activeItem.offsetTop;
    state.cursorNode.style.top = `${targetTopOffset}px`;
}


function beep(freq, duration, waveType = 'square', gainValue = 0.03) {
    if (!state.audioContext) return;
    
    const ctx = state.audioContext;
    const osc = ctx.createOscillator();
    const volumeNode = ctx.createGain();

    osc.type = waveType;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    
    volumeNode.gain.setValueAtTime(gainValue, ctx.currentTime);
    volumeNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);

    osc.connect(volumeNode);
    volumeNode.connect(ctx.destination);
    
    osc.start();
    osc.stop(ctx.currentTime + duration);
}


function triggerDialogue(conversationKey) {
    const dialoguePages = SHOP_DIALOGUE[conversationKey];
    if (!dialoguePages) return;
    
    state.activePageArray = dialoguePages;
    state.currentPageIndex = 0;
    buildAndTypeActivePage();
}
    function buildAndTypeActivePage() {
        clearTimeout(state.timerId);
        state.currentTextString = state.activePageArray[state.currentPageIndex];
        state.currentCharIndex = 0;
        state.isTextAnimating = true;
        state.textNode.innerHTML = "";
        processTextTick();
    }
    function processTextTick() {
        if (state.currentCharIndex >= state.currentTextString.length) {
            state.isTextAnimating = false;
            return;
        }
        let remainingStringSlice = state.currentTextString.slice(state.currentCharIndex);
        let calculatedSpeed = state.typingSpeedMs;
       
        if (remainingStringSlice.startsWith("[delay:")) {
            const closeBracketIndex = remainingStringSlice.indexOf("]");
            const parsedDelayValue = parseInt(remainingStringSlice.substring(7,
                                                                             closeBracketIndex), 10);
            state.currentCharIndex += closeBracketIndex + 1;
            state.timerId = setTimeout(processTextTick, parsedDelayValue);
            return;
        }
        const currentCharacter = state.currentTextString[state.currentCharIndex];
        state.textNode.innerHTML += currentCharacter;
        state.currentCharIndex++;
       
        if (currentCharacter !== " ") {
          
            beep(105 + (Math.random() * 12), 0.04, 'square', 0.04);
        }
        
        if ([".", "?", "!"].includes(currentCharacter)) {
            calculatedSpeed = state.typingSpeedMs * 8;
        } else if (currentCharacter === ",") {
            calculatedSpeed = state.typingSpeedMs * 4;
        }state.timerId = setTimeout(processTextTick, calculatedSpeed);
    }
    function advanceOrSkipText() {
        
        if (state.isTextAnimating) {
            clearTimeout(state.timerId);
            state.textNode.innerHTML = state.currentTextString.replace(/
                                                                       delay:\d+
                /g, "");
                state.isTextAnimating = false;
            return;
        }
        
        if (state.currentPageIndex < state.activePageArray.length - 1) {
            state.currentPageIndex++;
            buildAndTypeActivePage();
        }
    }
    function navigateVerticalMenu(directionSteps) {
        let newIndex = state.currentMenuIndex + directionSteps;
        
        if (newIndex >= 0 && newIndex < state.menuOptions.length) {
            state.currentMenuIndex = newIndex;
            positionSoulCursor();
            beep(210, 0.03, 'sine', 0.04);
        }
    }
    function selectActiveMenuAction() {
        const highlightedElement = state.menuOptions[state.currentMenuIndex];
        const targetActionKey = highlightedElement.getAttribute('data-action');
        beep(380, 0.05, 'triangle', 0.05);
        triggerDialogue(targetActionKey);
    }
    
    function setupControlBindings() {
        window.addEventListener('keydown', (e) => {
            
            if (e.key === 'ArrowUp') { e.preventDefault(); navigateVerticalMenu(-1); }
            if (e.key === 'ArrowDown') { e.preventDefault(); navigateVerticalMenu(1); }
            if (e.key.toLowerCase() === 'z' || e.key === 'Enter') {
                selectActiveMenuAction();
            }
            if (e.key.toLowerCase() === 'x' || e.key === 'Shift') {
                advanceOrSkipText();
            }
        });
       
        state.menuOptions.forEach(element => {
            element.addEventListener('mouseenter', () => {
                state.currentMenuIndex = parseInt(element.getAttribute('data-index'), 10);
                positionSoulCursor();
            });
            element.addEventListener('click', () => {
                selectActiveMenuAction();
            });
        });
        document.getElementById('left-dialogue-pane').addEventListener('click',
                                                                       advanceOrSkipText);
    }
    
    </script>
