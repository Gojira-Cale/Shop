<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Outwards Shop</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #shop-container {
            width: 800px;
            height: 600px;
            border: 4px solid white;
            position: relative;
            background: #000;
        }
        .pixelated {
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <div id="shop-container">
       <div id="idle-sprite">
                <img id="idle-sprite" src="assests/shop/me/idle-sprite.gif" alt="me">
    </div>

        <div id="shop-box">
    <!-- Click anywhere on the box to skip text OR advance the page -->
    <div id="dialogue-box" onclick="handleBoxClick()">
        <div style="display: flex; width: 100%;">
            <span class="asterisk">*</span> 
            <span id="dialogue-text">Heya!</span>
        </div>
        
        <div id="next-page-indicator">▼</div>
    </div>

    <div class="menu-buttons" style="margin-top: 20px;">
        <button onclick="startDialogueSequence('talk_lore')">Talk</button>
        <button onclick="startDialogueSequence('welcome')">Buy</button>
    </div>
</div>
</body>
</html>
