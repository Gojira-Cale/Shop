<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Outsiders Shop</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game">
    <!-- Shopkeeper -->
    <img id="shopkeeper" src="assests/shop/me/idle-sprite.gif" alt="Shopkeeper">

    <!-- Dialog Box -->
    <div id="dialog-box">
        <p id="dialog-text">Welcome!</p>
    </div>

    <!-- Menu -->
    <div id="menu">
        <div class="menu-option" data-action="buy">buy</div>
        <div class="menu-option" data-action="sell">sell</div>
        <div class="menu-option" data-action="talk">talk</div>
        <div class="menu-option" data-action="exit">exit</div>
    </div>

    <!-- Gold Counter -->
    <div id="gold">GOLD: <span id="gold-amount">100</span>G</div>
</div>
<script src="script.js"></script>
</body>
</html>
