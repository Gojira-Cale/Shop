<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Outwards Shop</title>

        <link href="/style.css" rel="stylesheet" type="text/css" media="all">
        <link href="/style.css" rel="stylesheet" type="text/css" media="all">
        <link href="/shopbox.css" rel="stylesheet" type="text/css" media="all">
        <link rel="icon" type="image" href="assests/deltarunelogo.png">
</head>
<body>
    
            <div id="idle-sprite">
                <img id="idle-sprite" src="assests/shop/me/idle-sprite.gif" alt="me">
           

            <div id="ShopBox">
                <p>Welcome-Welcome!, nice to see ya</p>
          </div>
         </div>
        </div>


        <!-- Bottom Panel: Menu Choices -->

                            <div class="ItemDesc">

                                        ITEM<br>

                                        Share with your friends<br>+10HP

            </div>
        </div>
