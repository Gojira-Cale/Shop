<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Outwards Shop</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #shop-container {
            width: 800px;
            height: 600px;
            border: 4px solid white;
            position: relative;
            background: #000;
        }
        .pixelated {
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <div id="shop-container">
       <div id="idle-sprite">
                <img id="idle-sprite" src="assests/shop/me/idle-sprite.gif" alt="me">
